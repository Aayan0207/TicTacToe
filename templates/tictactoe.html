<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <link rel="icon" href="../static/Tictactoe_icon.jpg" type="image/jpeg">
        <title>
            TicTacToe
        </title>
        <link rel="stylesheet" href="../static/tictactoe.css">
    </head>
    <body>
        <div class="form-container">
            <p style="font-size:30px;font-weight:normal;"><u><b>TicTacToe</p></u></b>
            <p style="font-size:18px;">Try to beat the AI. Good Luck.</p>
            <p style="font-size:18px;" id="text_string">{{string}}</p>
            <form action="/" method="post" id="TicTacToe-form">
                <input type="text" name="X" value="" id="X" placeholder="Play as X" readonly class="play">
                <input type="text" name="O" value="" id="O" placeholder="Play as O" readonly class="play">
                <div class="grid-container">
                    {% for i in range(3) %}
                        {% for j in range(3)%}
                        <input type="text" placeholder="{{board[i][j]}}" id="{{i}}{{j}}" maxlength="1" autocomplete="off" size="1" readonly class="square">
                        {% endfor %}
                    {% endfor %}
                    <br>
                    <br>
                    <button type="submit" id="New_Game" align="center"><span class="text">New Game</span></button>
                </div>
                <input type="text" name="guess" maxlength="2" autocomplete="off" size="2" id="guess" autofocus>
            </form>
        </div>
        <script src="../static/tictactoe.js"></script>
    </body>
</html>
